      - store_domain: []
        cart_token: []
      parameters: []
      responses:
        '200':
          description: Item removed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/cart"
        '422':
          description: Invalid parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cart_item_id:
                  type: integer
              required:
              - cart_item_id
  "/api/v1/storefront/cart/clear":
    delete:
      summary: Clear cart
      tags:
      - Storefront / Cart
      security:
      - store_domain: []
        cart_token: []
