                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: integer
                variant_id:
                  type: integer
                  nullable: true
                  description: Required if product has variants
                quantity:
                  type: integer
                  default: 1
                  minimum: 1
              required:
              - product_id
  "/api/v1/storefront/cart/update_item":
    patch:
      summary: Update cart item quantity
