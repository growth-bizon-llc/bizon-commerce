          type: object
          nullable: true
        orders_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    cart_item:
      type: object
      properties:
        id:
          type: integer
        quantity:
          type: integer
        unit_price:
