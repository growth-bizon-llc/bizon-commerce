          nullable: true
        sku:
          type: string
          nullable: true
        status:
          type: string
          enum:
          - draft
          - active
          - archived
        featured:
          type: boolean
        quantity:
          type: integer
        track_inventory:
          type: boolean
        position:
          type: integer
          nullable: true
        base_price:
