  "/api/v1/storefront/customers":
    post:
      summary: Register customer
      tags:
      - Storefront / Customers
      security:
      - store_domain: []
      parameters: []
      responses:
        '201':
          description: Customer registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    "$ref": "#/components/schemas/customer"
                  token:
                    type: string
                    description: JWT token valid for 24 hours. Send as X-Customer-Token
                      header.
        '422':
          description: Validation errors
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                customer:
                  type: object
                  properties:
                    email:
                      type: string
                      example: customer@example.com
                    first_name:
                      type: string
                      example: John
                    last_name:
                      type: string
                      example: Doe
                    phone:
                      type: string
                      example: "+1234567890"
                    password:
                      type: string
                      example: password123
                      minimum: 6
                    password_confirmation:
                      type: string
                      example: password123
                  required:
                  - email
                  - password
                  - password_confirmation
              required:
              - customer
  "/api/v1/storefront/orders":
    post:
      summary: Create order (checkout)
      tags:
      - Storefront / Orders
      description: Creates an order from the current cart. Requires a valid cart token
        with items.
      security:
      - store_domain: []
        cart_token: []
        customer_token: []
      parameters: []
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/order"
        '422':
          description: Invalid parameters or empty cart
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: customer@example.com
                  description: Required if not logged in
                shipping_address:
                  type: object
                  properties:
                    first_name:
                      type: string
                    last_name:
                      type: string
                    address1:
                      type: string
                    address2:
                      type: string
                    city:
                      type: string
                    state:
                      type: string
                    zip:
                      type: string
                    country:
                      type: string
                    phone:
                      type: string
                billing_address:
                  type: object
                  properties:
                    first_name:
                      type: string
                    last_name:
                      type: string
                    address1:
                      type: string
                    address2:
                      type: string
                    city:
                      type: string
                    state:
                      type: string
                    zip:
                      type: string
                    country:
                      type: string
                    phone:
                      type: string
                notes:
                  type: string
                  nullable: true
              required:
              - email
              - shipping_address
  "/api/v1/storefront/orders/{order_number}":
    parameters:
    - name: order_number
      in: path
      required: true
      description: 'Order number (e.g., #1001)'
      example: "#1001"
      schema:
        type: string
    get:
      summary: Get order
      tags:
      - Storefront / Orders
      security:
      - store_domain: []
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/order"
        '404':
          description: Not found
  "/api/v1/storefront/products":
    get:
      summary: List products
      tags:
      - Storefront / Products
      security:
      - store_domain: []
      parameters:
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: items
        in: query
        required: false
        description: Items per page
        schema:
          type: integer
      - name: category_id
        in: query
        required: false
        description: Filter by category
        schema:
          type: integer
      - name: q
        in: query
        required: false
        description: Search by name
        schema:
          type: string
      - name: featured
        in: query
        required: false
        description: Filter featured products
        schema:
          type: boolean
      - name: in_stock
        in: query
        required: false
        description: Filter in-stock products
        schema:
          type: boolean
      responses:
        '200':
          description: Products list
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      "$ref": "#/components/schemas/product_list"
                  meta:
                    "$ref": "#/components/schemas/pagination_meta"
  "/api/v1/storefront/products/{slug}":
    parameters:
    - name: slug
      in: path
      required: true
      description: Product slug
      schema:
        type: string
    get:
      summary: Get product
      tags:
      - Storefront / Products
      security:
      - store_domain: []
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/product"
        '404':
          description: Not found
  "/api/v1/storefront/session":
    post:
      summary: Customer login
      tags:
      - Storefront / Sessions
      security:
      - store_domain: []
      parameters: []
      responses:
        '200':
          description: Logged in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    "$ref": "#/components/schemas/customer"
                  token:
                    type: string
                    description: JWT token valid for 24 hours. Send as X-Customer-Token
                      header.
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: customer@example.com
                password:
                  type: string
                  example: password123
              required:
              - email
              - password
servers:
- url: http://localhost:3000
  description: Development
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin JWT token (obtained via POST /api/v1/admin/auth/sign_in)
    store_domain:
      type: apiKey
      in: header
      name: X-Store-Domain
      description: Store domain or subdomain for tenant resolution (Storefront)
    cart_token:
      type: apiKey
      in: header
      name: X-Cart-Token
      description: Cart token for cart identification
    customer_token:
      type: apiKey
      in: header
      name: X-Customer-Token
      description: Customer JWT token (obtained via POST /api/v1/storefront/session)
  schemas:
    money:
      type: object
      properties:
        amount:
          type: number
          example: 29.99
        currency:
          type: string
          example: USD
    pagination_meta:
      type: object
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total_pages:
          type: integer
        total_count:
          type: integer
    category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        position:
          type: integer
          nullable: true
        active:
          type: boolean
        parent_id:
          type: integer
          nullable: true
        children_count:
          type: integer
        products_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    variant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
          nullable: true
        track_inventory:
          type: boolean
        quantity:
          type: integer
        options:
          type: object
        position:
          type: integer
          nullable: true
        active:
          type: boolean
        price:
          "$ref": "#/components/schemas/money"
        compare_at_price:
          "$ref": "#/components/schemas/money"
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    product_image:
      type: object
      properties:
        id:
          type: integer
        position:
          type: integer
          nullable: true
        alt_text:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        short_description:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        status:
          type: string
          enum:
          - draft
          - active
          - archived
        featured:
          type: boolean
        custom_attributes:
          type: object
          nullable: true
        quantity:
          type: integer
        track_inventory:
          type: boolean
        position:
          type: integer
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
        base_price:
          "$ref": "#/components/schemas/money"
        compare_at_price:
          "$ref": "#/components/schemas/money"
          nullable: true
        category:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            slug:
              type: string
            position:
              type: integer
              nullable: true
            active:
              type: boolean
