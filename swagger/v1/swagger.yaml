      parameters: []
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/cart"
        '422':
          description: Invalid parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cart_item_id:
                  type: integer
                quantity:
                  type: integer
                  minimum: 1
              required:
              - cart_item_id
              - quantity
  "/api/v1/storefront/cart/remove_item":
