            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      "$ref": "#/components/schemas/category"
  "/api/v1/storefront/categories/{slug}":
    parameters:
    - name: slug
      in: path
      required: true
